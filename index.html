<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Efekta Project ２６日６月</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0b0b;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            font-family: Arial, sans-serif;
        }

        h1 {
            color: #fff;
            font-size: 1.8rem;
            font-weight: 300;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        .image-container {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .image-wrapper {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #1a1a1a;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }

        .image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }

        .image-wrapper .caption {
            color: #aaa;
            padding: 0.8rem 1.2rem;
            font-size: 0.9rem;
            background: #141414;
            border-top: 1px solid #2a2a2a;
        }
    </style>
</head>
<body>
    <div class="image-container">

        <!--Image 1-->
        <div class="image-wrapper">
            <img 
                src="images/1.png" 
                alt="Image 1" 
                loading="lazy"
            />
            <div class="caption">始め</div>
        </div>

        <!--Image 2-->
        <div class="image-wrapper">
            <img 
                src="images/2.png" 
                alt="Image 2" 
                loading="lazy"
            />
            <div class="caption">武道のこと</div>
        </div>

        <!--Image 3-->
        <div class="image-wrapper">
            <img 
                src="images/3.png" 
                alt="Image 3" 
                loading="lazy"
            />
            <div class="caption">スポーツのこと</div>
        </div>

        <!--Image 4-->
        <div class="image-wrapper">
            <img 
                src="images/4.png" 
                alt="Image 4" 
                loading="lazy"
            />
            <div class="caption">１．共通のこと</div>
        </div>

        <!--Image 5-->
        <div class="image-wrapper">
            <img 
                src="images/5.png" 
                alt="Image 5" 
                loading="lazy"
            />
            <div class="caption">２．共通のこと</div>
        </div>

        <div class="image-wrapper">
            <div class="caption">ウェブサイト: <a href="https://www.budo-dojo-navi.com/what-is-the-difference-between-martial-arts-and-sports/">https://www.budo-dojo-navi.com/what-is-the-difference-between-martial-arts-and-sports/</a></div>
        </div>
    </div>
</body>
</html>
